# SpecScore Repo Config Schema: https://specscore.md/repo-config

project:
    title: Sneat Platform Specs
    host: github.com
    org: sneat-co
    repo: sneat-specs

gates:
    feature.approved:
        reviewers:
            - name: spec-reviewer
              type: ai
              prompt: .specscore/reviewers/feature-spec-reviewer.md
              description: Baseline SpecScore Feature reviewer (BA/Developer/QA lenses)
            - name: human-approval
              type: human
              description: Human author approval before plan/implement
